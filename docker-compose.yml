services:
  api:
      build: ./backend
      container_name: dedsec_api
      ports:
        - "8000:8000"
      env_file: .env
      volumes:
        - ./backend:/app
        - scan_tmp:/tmp/scans
      depends_on:
        - redis
      command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  worker:
      build: ./backend
      container_name: dedsec_worker
      env_file: .env
      volumes:
        - ./backend:/app
        - scan_tmp:/tmp/scans
      depends_on:
        - redis
      command: celery -A worker.celery_app worker --loglevel=info --concurrency=4

  redis:
    image: redis:7-alpine
    container_name: dedsec_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  frontend:
    build: ./frontend
    container_name: dedsec_frontend
    ports:
      - "5173:5173"
    env_file: ./frontend/.env
    volumes:
      - ./frontend:/app
      - /app/node_modules
    command: npm run dev -- --host

volumes:
  redis_data:
  scan_tmp: